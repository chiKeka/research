name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-check (astro check)
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Ledger freshness (warns; pass --strict to gate)
        run: npm run ledger:fresh

      - name: Link check (built site)
        uses: lycheeverse/lychee-action@v2
        with:
          # --root-dir lets lychee resolve root-relative links (/ledger, /about)
          # in the local dist; github.workspace is the trusted runner path.
          args: >-
            --no-progress
            --root-dir ${{ github.workspace }}/dist
            --max-retries 2
            --accept 200,202,206,403,429
            --exclude '://(www\.)?(x|twitter|linkedin)\.com/'
            './dist/**/*.html'
          fail: true

  lighthouse:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Lighthouse CI (budget assertions)
        # Reports scores and asserts the budget. Left non-blocking until the
        # thresholds are confirmed against a few real runs; flip to a hard gate
        # by removing continue-on-error and raising the assertions to "error".
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .github/lighthouse/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
